name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Test Duikplanner engine
        run: node duikplanner/engine.test.mjs

      - name: Assemble site
        run: |
          mkdir -p _site/vo2max _site/woningaankoop
          cp duikplanner/index.html _site/index.html
          cp vo2max/index.html _site/vo2max/index.html
          cp woningaankoop/index.html _site/woningaankoop/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
